<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | UNITYCARE</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">

<script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>

<body class="auth-body">

<div class="auth-container">

  <!-- LEFT -->
  <section class="auth-left">
    <div class="auth-left-overlay"></div>

    <div class="auth-brand">
      <img class="auth-brand-logo" src="logo.png">
      <h1 class="auth-brand-title">UNITYCARE</h1>
      <p class="auth-brand-subtitle">Support • Care • Connection</p>
    </div>
  </section>

  <!-- RIGHT -->
  <section class="auth-right">

    <div class="auth-box">

      <h2 class="auth-title">Login</h2>
      <p class="auth-subtitle">Welcome back!</p>
      <div class="auth-role" id="roleDisplay">
   Role: <b>Not Selected</b>
</div>

      <form class="auth-form" onsubmit="event.preventDefault(); register();">

        
        <label class="auth-label">Email</label>
        <input class="auth-input" id="email">

        <label class="auth-label">Password</label>
        <input class="auth-input" id="password">

        <button class="auth-btn" type="submit">
          Login
        </button>

        <div class="auth-message" id="regError"></div>

      </form>

      <!-- TEMP PASSWORD BOX -->
      <div class="auth-temp-box" id="tempBox">
        <p class="auth-temp-title">Temporary Password</p>
        <p class="auth-temp-password" id="tempPass"></p>
        <p class="auth-temp-note">Save this password before leaving.</p>
      </div>

      <div class="auth-footer">
        <span class="auth-footer-text">Already have an account?</span>
        <a class="auth-footer-link" href="register.html">Login</a>
      </div>

    </div>

  </section>

</div>

</body>

<script>
let attempts = 5;

const role = localStorage.getItem("userRole") || "Not selected";
document.getElementById("roleDisplay").textContent = "Role: " + role;

function login() {
  const email = document.getElementById("loginEmail").value.trim();
  const pass = document.getElementById("loginPass").value.trim();
  const error = document.getElementById("error");

  error.style.color = "red";

  if (role === "Not selected") {
    error.textContent = "Please select a role first.";
    return;
  }

  if (!email || !pass) {
    error.textContent = "Please fill in all fields.";
    return;
  }

  const captcha = grecaptcha.getResponse();
  if (!captcha) {
    error.textContent = "Please complete reCAPTCHA.";
    return;
  }

  attempts--;
  document.getElementById("attempts").textContent = attempts;

  if (attempts <= 0) {
    error.textContent = "Too many failed attempts.";
    document.querySelector(".login-form-button").disabled = true;
    return;
  }

  error.style.color = "green";
  error.textContent = "Login successful! Redirecting...";

  setTimeout(() => {
    if (role === "admin") window.location.href = "admin-dashboard.html";
    else if (role === "student") window.location.href = "dashboard.html";
    else if (role === "counselor") window.location.href = "counselor-dashboard.html";
  }, 1000);
}
</script>

</body>
</html>
