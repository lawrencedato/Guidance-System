<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="UNITYCARE Role Selection Portal">
  <title>Select Role | UNITYCARE</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body style="background: url('bg.png') no-repeat center center fixed; background-size: cover;">

  <main id="main-content">

    <section class="role-selection">

      <header class="brand-header">
        <figure class="logo-wrapper">
          <img src="logo.png" alt="UNITYCARE Logo" width="80" height="80">
          <figcaption>
            <h1>UNITYCARE</h1>
          </figcaption>
        </figure>
      </header>

      <article class="role-card">

        <header>
          <h2>Select Your Role</h2>
          <p>Please choose your account type to continue</p>
        </header>

        <div class="role-buttons">


          <button type="button" class="role-btn student" onclick="handleRoleSelection('student')">
            Student
          </button>

          <button type="button" class="role-btn counselor" onclick="handleRoleSelection('counselor')">
            Counselor
          </button>
          
          <button type="button" class="role-btn admin" onclick="handleRoleSelection('admin')">
            Admin
          </button>

        </div>

      </article>

      <footer class="role-footer">
        <p>&copy; 2026 UNITYCARE. All rights reserved.</p>
      </footer>

    </section>

  </main>

  <script>
    function handleRoleSelection(role) {
      localStorage.setItem("userRole", role);

      switch (role) {
        case "student":
          window.location.href = "login.html";
          break;
        case "counselor":
          window.location.href = "counselor.html";
          break;
        case "admin":
        default:
          window.location.href = "admin-dashboard.html";
          break;
      }
    }
  </script>

</body>
</html>
