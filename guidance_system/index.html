<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="UNITYCARE Role Selection Portal">
  <title> UNITYCARE | Select RoleUNITYCARE</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body class="roleSelect-body">

  <main class="roleSelect-main-content">

    <section class="roleSelect-section-wrapper">

      <header class="roleSelect-header-brand">
        <figure class="roleSelect-header-logoWrapper">
          <img class="roleSelect-header-logoImage" src="logo.png" alt="UNITYCARE Logo">
          <figcaption>
            <h1 class="roleSelect-header-title">UNITYCARE</h1>
          </figcaption>
        </figure>
      </header>

      <article class="roleSelect-card-container">

        <header class="roleSelect-card-header">
          <h2 class="roleSelect-card-title">Select Your Role</h2>
          <p class="roleSelect-card-subtitle">Please choose your account type to continue</p>
        </header>

        <div class="roleSelect-card-buttons">

          <button class="roleSelect-card-button roleSelect-card-button-student"
            onclick="handleRoleSelection('student')">
            Student
          </button>

          <button class="roleSelect-card-button roleSelect-card-button-counselor"
            onclick="handleRoleSelection('counselor')">
            Counselor
          </button>

          <button class="roleSelect-card-button roleSelect-card-button-admin"
            onclick="handleRoleSelection('admin')">
            Admin
          </button>

        </div>

      </article>

      <footer class="roleSelect-footer">
        <p class="roleSelect-footer-text">© 2026 UNITYCARE. All rights reserved.</p>
      </footer>

    </section>

  </main>

  <script>
    function handleRoleSelection(role) {
      localStorage.setItem("userRole", role);

      switch (role) {
        case "student":
          window.location.href = "login.html";
          break;
        case "counselor":
          window.location.href = "clogin.html";
          break;
        case "admin":
        default:
          window.location.href = "admin-dashboard.html";
          break;
      }
    }
  </script>

</body>
</html>
