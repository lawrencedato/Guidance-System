<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | UNITYCARE</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">

<script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>

<body class="auth-body">

<div class="auth-container">

  <!-- LEFT -->
  <section class="auth-left">
    <div class="auth-left-overlay"></div>

    <div class="auth-brand">
      <img class="auth-brand-logo" src="logo.png">
      <h1 class="auth-brand-title">UNITYCARE</h1>
      <p class="auth-brand-subtitle">Support • Care • Connection</p>
    </div>
  </section>

  <!-- RIGHT -->
  <section class="auth-right">

    <div class="auth-box">

      <h2 class="auth-title">Login</h2>
      <p class="auth-subtitle">Welcome back!</p>
      <div class="auth-role" id="roleDisplay">
   Role: <b>Not Selected</b>
</div>

      <form class="auth-form" onsubmit="event.preventDefault(); login();">

        
        <label class="auth-label">Email</label>
        <input class="auth-input" id="email">

        <label class="auth-label">Password</label>
        <input class="auth-input" id="password">

        <button class="auth-btn" type="submit">
          Login
        </button>

        <div class="auth-message" id="regError"></div>

      </form>

      <!-- TEMP PASSWORD BOX -->
      <div class="auth-temp-box" id="tempBox">
        <p class="auth-temp-title">Temporary Password</p>
        <p class="auth-temp-password" id="tempPass"></p>
        <p class="auth-temp-note">Save this password before leaving.</p>
      </div>

    <div class="auth-footer">

        <div class="auth-footer-text">
          Doesn't have an account?
        </div>

        <a class="auth-footer-link" href="register.html">
          Register
        </a>

      </div>

    </div>

  </section>

</div>

</body>

<script>
function login() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const error = document.getElementById("regError");

  error.style.color = "red";

  const savedEmail = localStorage.getItem("registeredEmail");
  const savedPassword = localStorage.getItem("userPassword");

  if (!email || !password) {
    error.textContent = "Please fill in all fields.";
    return;
  }

  if (email !== savedEmail || password !== savedPassword) {
    error.textContent = "Invalid email or password.";
    return;
  }

  error.style.color = "green";
  error.textContent = "Login successful! Redirecting...";

  setTimeout(() => {
    window.location.href = "dashboard.html";
  }, 1000);
}
</script>

</body>
</html>
