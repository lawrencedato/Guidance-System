<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Role - UNITYCARE</title>


<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">


<style>
body {
  font-family: 'Poppins', sans-serif;
}


.role-container {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: var(--bg);
}


.role-box {
  width: 350px;
  background: var(--card);
  padding: 30px;
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  text-align: center;
}


.role-box h2 {
  margin-bottom: 20px;
}


.role-btn {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 600;
  font-family: 'Poppins', sans-serif;
  color: white;
  transition: 0.2s;
}


.role-btn:hover {
  opacity: 0.85;
}


.role-btn.admin { background: #113F67; }
.role-btn.student { background: #34699A; }
.role-btn.counselor { background: #1F6FEB; }
</style>
</head>


<body>


<div class="role-container">


  <div class="role-box">
    <h2>Select Your Role</h2>
    <p>Please choose your account type</p>


    <button class="role-btn admin" onclick="selectRole('admin')">
      Admin
    </button>


  <button class="role-btn student" onclick="selectRole('student')">
  Student
</button>


    <button class="role-btn counselor" onclick="selectRole('counselor')">
      Counselor
    </button>


  </div>


</div>


<script>
function selectRole(role) {
  // save selected role
  localStorage.setItem("userRole", role);


  // redirect based on role
 if (role === "student") {
  window.location.href = "index.html";
}
else if (role === "counselor") {
  window.location.href = "counselor.html";
}
else {
  window.location.href = "admin-dashboard.html";
}
}
</script>


</body>
</html>
